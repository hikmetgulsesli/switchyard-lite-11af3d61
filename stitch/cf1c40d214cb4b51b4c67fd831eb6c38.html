<style>
        body {
            background-color: #161308;
            color: #eae2cf;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent scrolling during gameplay */
        }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Grid Background Pattern */
        .grid-pattern {
            background-size: 64px 64px;
            background-image: 
                linear-gradient(to right, rgba(77, 71, 50, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(77, 71, 50, 0.2) 1px, transparent 1px);
        }

        /* Tactile Button Press */
        .btn-tactile {
            border-bottom-width: 2px;
            transition: all 0.1s ease-in-out;
        }
        .btn-tactile:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-bottom: 2px; /* compensate for border loss */
        }

        /* Glowing Tracks */
        .track-glow {
            box-shadow: 0 0 10px rgba(255, 225, 109, 0.5);
        }

        /* Train Animation */
        @keyframes moveTrain {
            0% { transform: translateX(0); }
            100% { transform: translateX(256px); } /* 4 grid units */
        }
        .train {
            animation: moveTrain 4s linear infinite;
        }
    </style>
</head>
